<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroPass | Personal Hub Travel Guide</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255, 255, 255, 0.8);
            --ios-blue: #007aff;
            --ios-gray: #8e8e93;
            --ios-label: #1c1c1e;
            --ios-separator: #c6c6c8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-label);
            line-height: 1.4;
            padding-bottom: 50px;
        }

        /* Map Background */
        .map-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            opacity: 0.05;
            z-index: -1;
        }

        header {
            padding: 50px 20px 30px;
            text-align: center;
            background: white;
        }

        header h1 { font-size: 34px; font-weight: 800; letter-spacing: -1.2px; }
        header p { color: var(--ios-gray); font-size: 16px; margin-top: 5px; }

        /* City Selector Section */
        .base-selector-container {
            background: white;
            padding: 20px;
            border-bottom: 0.5px solid var(--ios-separator);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .base-selector-container label {
            font-size: 14px;
            font-weight: 600;
            color: var(--ios-blue);
        }

        select {
            appearance: none;
            background-color: #f2f2f7;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: var(--ios-label);
            width: 80%;
            max-width: 300px;
            text-align: center;
            cursor: pointer;
        }

        /* Navigation */
        .nav-container {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 15px 0;
            border-bottom: 0.5px solid var(--ios-separator);
        }

        .segmented-control {
            display: flex;
            background: #e3e3e8;
            padding: 2px;
            border-radius: 12px;
            width: 92%;
            margin: 0 auto 10px;
        }

        .segment-btn {
            flex: 1;
            border: none;
            background: none;
            padding: 8px 0;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
        }

        .segment-btn.active {
            background: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            color: var(--ios-blue);
        }

        /* Route Display */
        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .route-card {
            background: var(--ios-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .badge-row {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 10px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
        }
        .badge-geo { background: #ffe2e2; color: #ff3b30; }
        .badge-time { background: #e1f5fe; color: #007aff; }
        .badge-price { background: #e8f5e9; color: #34c759; }

        .route-title { font-size: 19px; font-weight: 700; margin-bottom: 15px; letter-spacing: -0.5px; }

        .path-visual {
            border-left: 2px solid var(--ios-blue);
            padding-left: 20px;
            margin: 15px 5px;
        }

        .path-node {
            position: relative;
            margin-bottom: 12px;
            font-size: 15px;
            font-weight: 500;
        }

        .path-node::before {
            content: '';
            position: absolute;
            left: -27px;
            top: 4px;
            width: 12px;
            height: 12px;
            background: white;
            border: 3px solid var(--ios-blue);
            border-radius: 50%;
        }

        .route-desc {
            font-size: 14px;
            color: #3a3a3c;
            background: rgba(0,0,0,0.03);
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* Footer Apps */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 30px;
            padding: 0 20px;
        }

        .app-item {
            text-align: center;
            text-decoration: none;
            color: var(--ios-label);
        }

        .app-icon {
            width: 58px;
            height: 58px;
            background: white;
            border-radius: 14px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .app-item span { font-size: 11px; font-weight: 500; }

    </style>
</head>
<body>

    <div class="map-bg"></div>

    <header>
        <h1>EuroPass</h1>
        <p>나의 거점 도시 맞춤형 여행 설계</p>
    </header>

    <div class="base-selector-container">
        <label>나의 시작 도시 설정</label>
        <select id="baseCity" onchange="updateBaseCity()">
            <option value="munich">🇩🇪 뮌헨 / 잉골슈타트</option>
            <option value="berlin">🇩🇪 베를린</option>
            <option value="frankfurt">🇩🇪 프랑크푸르트</option>
            <option value="paris">🇫🇷 파리</option>
            <option value="prague">🇨🇿 프라하</option>
        </select>
    </div>

    <nav class="nav-container">
        <div class="segmented-control">
            <button class="segment-btn active" onclick="setDuration('short')">단기(2~3일)</button>
            <button class="segment-btn" onclick="setDuration('mid')">중기(5~7일)</button>
            <button class="segment-btn" onclick="setDuration('long')">장기(10일+)</button>
        </div>
    </nav>

    <div class="container" id="route-display">
        <!-- JS로 데이터가 삽입됨 -->
    </div>

    <div class="container">
        <h3 style="font-size: 16px; margin-bottom: 15px;">필수 여행 도구</h3>
        <div class="app-grid">
            <a href="https://www.skyscanner.net" target="_blank" class="app-item"><div class="app-icon">✈️</div><span>항공</span></a>
            <a href="https://www.omio.com" target="_blank" class="app-item"><div class="app-icon">🚆</div><span>교통</span></a>
            <a href="https://www.booking.com" target="_blank" class="app-item"><div class="app-icon">🏨</div><span>숙소</span></a>
            <a href="https://www.google.com/maps" target="_blank" class="app-item"><div class="app-icon">🗺️</div><span>지도</span></a>
        </div>
    </div>

    <script>
        // 전역 여행 데이터 (거점별 단기/중기/장기 각 3개 이상 코스)
        const travelData = {
            munich: {
                short: [
                    { title: "알프스의 눈동자", countries: 1, duration: "1박 2일", cost: "100€", path: ["뮌헨", "퓌센", "가르미슈"], desc: "바이에른 티켓으로 가장 알뜰하게 다녀오는 자연 힐링 코스입니다." },
                    { title: "모차르트의 고향", countries: 2, duration: "2박 3일", cost: "180€", path: ["뮌헨", "살츠부르크", "할슈타트"], desc: "오스트리아 국경을 넘어 호수마을의 정취를 느끼는 클래식 노선입니다." },
                    { title: "맥주와 역사의 도시", countries: 1, duration: "2박 3일", cost: "150€", path: ["뮌헨", "뉘른베르크", "밤베르크"], desc: "독일의 전통적인 아름다움과 훈제맥주를 경험하는 먹거리 코스입니다." }
                ],
                mid: [
                    { title: "황금 삼각지대 투어", countries: 3, duration: "5박 6일", cost: "500€", path: ["뮌헨", "프라하", "비엔나", "부다페스트"], desc: "교환학생의 로망! 야간버스를 활용해 동유럽 핵심 3개국을 정복합니다." },
                    { title: "이탈리아 르네상스", countries: 2, duration: "6박 7일", cost: "750€", path: ["뮌헨", "베네치아", "피렌체", "로마"], desc: "뮌헨 중앙역에서 기차로 바로 연결되는 이탈리아 예술 기행입니다." },
                    { title: "스위스 만년설 여행", countries: 2, duration: "5박 6일", cost: "900€", path: ["뮌헨", "취리히", "루체른", "인터라켄"], desc: "알프스의 하이라이트. 풍경은 최고지만 높은 물가에 대비하세요." }
                ],
                long: [
                    { title: "유럽 지중해 대장정", countries: 4, duration: "12박 13일", cost: "1600€", path: ["뮌헨", "베네치아", "로마", "니스", "바르셀로나"], desc: "남부 유럽의 해안선을 따라가는 꿈의 여름방학 코스입니다." },
                    { title: "서유럽 4개국 실속", countries: 4, duration: "10박 11일", cost: "1300€", path: ["뮌헨", "파리", "브뤼셀", "암스테르담", "베를린"], desc: "서유럽의 주요 수도를 반시계 방향으로 정복하는 루트입니다." },
                    { title: "동구권 정밀 탐방", countries: 6, duration: "14박 15일", cost: "1100€", path: ["뮌헨", "프라하", "크라쿠프", "바르샤바", "부다페스트", "자그레브", "류블랴나"], desc: "가성비가 가장 훌륭한 코스. 물가가 저렴한 도시 위주로 구성했습니다." }
                ]
            },
            berlin: {
                short: [
                    { title: "프로이센의 자취", countries: 1, duration: "2박 3일", cost: "120€", path: ["베를린", "포츠담", "드레스덴"], desc: "독일 근대사의 중심지를 돌아보는 역사 깊은 단기 투어입니다." },
                    { title: "폴란드 퀵 스캔", countries: 2, duration: "2박 3일", cost: "140€", path: ["베를린", "포즈난", "브로츠와프"], desc: "베를린에서 기차로 2-3시간이면 만나는 저렴하고 이국적인 폴란드 여행입니다." },
                    { title: "한자동맹의 항구", countries: 1, duration: "2박 3일", cost: "160€", path: ["베를린", "함부르크", "뤼베크"], desc: "독일 북부의 세련된 항구 도시와 전통적인 북독일의 미를 만납니다." }
                ],
                mid: [
                    { title: "동유럽 3국 수도", countries: 3, duration: "5박 6일", cost: "400€", path: ["베를린", "프라하", "브라티슬라바", "비엔나"], desc: "베를린을 기점으로 동남향으로 내려가는 가장 효율적인 동선입니다." },
                    { title: "발틱해 연안 투어", countries: 3, duration: "6박 7일", cost: "650€", path: ["베를린", "그단스크", "빌뉴스", "리가"], desc: "색다른 유럽을 원하는 분들을 위한 발트 3국 맛보기 노선입니다." },
                    { title: "북독일 & 덴마크", countries: 2, duration: "5박 6일", cost: "700€", path: ["베를린", "함부르크", "코펜하겐", "오덴세"], desc: "디자인과 여유가 있는 북쪽으로의 여정입니다." }
                ],
                long: [
                    { title: "스칸디나비아 정복", countries: 4, duration: "12박 13일", cost: "2100€", path: ["베를린", "코펜하겐", "스톡홀름", "오슬로", "베르겐"], desc: "북유럽의 자연과 세련미를 모두 경험하는 장기 대장정입니다." },
                    { title: "동유럽 벨트 투어", countries: 5, duration: "11박 12일", cost: "900€", path: ["베를린", "바르샤바", "크라쿠프", "부다페스트", "비엔나", "프라하"], desc: "가장 클래식한 배낭여행 코스. 학생 할인 혜택이 매우 많습니다." },
                    { title: "서부 전선 이상없다", countries: 4, duration: "10박 11일", cost: "1400€", path: ["베를린", "하노버", "암스테르담", "브뤼셀", "파리"], desc: "독일을 가로질러 파리까지 진격하는 서유럽 핵심 정복 루트입니다." }
                ]
            },
            frankfurt: {
                short: [
                    { title: "로맨틱 라인강", countries: 1, duration: "1박 2일", cost: "130€", path: ["프랑크푸르트", "하이델베르크", "뤼데스하임"], desc: "독일에서 가장 아름다운 고성들과 대학 도시를 여행합니다." },
                    { title: "베네룩스 맛보기", countries: 3, duration: "2박 3일", cost: "250€", path: ["프랑크푸르트", "룩셈부르크", "메츠(프랑스)"], desc: "중부 유럽의 작은 거인들을 빠르게 정복하는 코스입니다." },
                    { title: "검은 숲의 정령", countries: 1, duration: "2박 3일", cost: "180€", path: ["프랑크푸르트", "바덴바덴", "프라이부르크"], desc: "독일 남서부의 온천과 대자연을 즐기는 힐링 노선입니다." }
                ],
                mid: [
                    { title: "서유럽 골든벨트", countries: 4, duration: "6박 7일", cost: "850€", path: ["프랑크푸르트", "암스테르담", "브뤼셀", "파리"], desc: "교통의 요지 프랑크푸르트에서 출발하는 서유럽 정석 코스입니다." },
                    { title: "알프스 산맥 횡단", countries: 3, duration: "6박 7일", cost: "900€", path: ["프랑크푸르트", "슈투트가르트", "취리히", "인스부르크"], desc: "독일, 스위스, 오스트리아의 알프스 산자락을 잇는 장관을 선사합니다." },
                    { title: "프랑스 문화 기행", countries: 2, duration: "5박 6일", cost: "800€", path: ["프랑크푸르트", "스트라스부르", "리옹", "파리"], desc: "프랑스의 맛과 멋을 느낄 수 있는 미식 여행 코스입니다." }
                ],
                long: [
                    { title: "그랜드 서유럽 일주", countries: 5, duration: "12박 13일", cost: "1700€", path: ["프랑크푸르트", "파리", "런던", "브뤼셀", "암스테르담", "쾰른"], desc: "런던까지 포함된 서유럽의 모든 것을 경험하는 풀코스입니다." },
                    { title: "이베리아반도 원정", countries: 3, duration: "14박 15일", cost: "1800€", path: ["프랑크푸르트", "마드리드", "리스본", "포르투", "바르셀로나"], desc: "프랑크푸르트 공항의 이점을 살려 비행기로 이동 후 즐기는 태양의 나라 루트입니다." },
                    { title: "지중해 크루즈 루트", countries: 4, duration: "13박 14일", cost: "1500€", path: ["프랑크푸르트", "밀라노", "피렌체", "로마", "니스", "마르세유"], desc: "기차와 버스로 즐기는 유럽 남부 해안 여행의 정점입니다." }
                ]
            }
            // 프라하, 파리 등 데이터도 이와 같은 구조로 확장 가능
        };

        let currentCity = 'munich';
        let currentDuration = 'short';

        function updateBaseCity() {
            currentCity = document.getElementById('baseCity').value;
            render();
        }

        function setDuration(duration) {
            currentDuration = duration;
            document.querySelectorAll('.segment-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function render() {
            const display = document.getElementById('route-display');
            const routes = travelData[currentCity] ? travelData[currentCity][currentDuration] : [];
            
            if (routes.length === 0) {
                display.innerHTML = `<p style="text-align:center; padding:50px; color:var(--ios-gray);">해당 도시의 코스는 곧 업데이트될 예정입니다.</p>`;
                return;
            }

            let html = '';
            routes.forEach(route => {
                let pathHTML = '';
                route.path.forEach(step => {
                    pathHTML += `<div class="path-node">${step}</div>`;
                });

                html += `
                    <div class="route-card">
                        <div class="badge-row">
                            <span class="badge badge-geo">🌍 ${route.countries}개국</span>
                            <span class="badge badge-time">🕒 ${route.duration}</span>
                            <span class="badge badge-price">💸 약 ${route.cost}</span>
                        </div>
                        <h2 class="route-title">${route.title}</h2>
                        <div class="path-visual">
                            ${pathHTML}
                        </div>
                        <p class="route-desc">${route.desc}</p>
                    </div>
                `;
            });

            display.innerHTML = html;
        }

        // 초기 실행
        window.onload = render;
    </script>
</body>
</html>
